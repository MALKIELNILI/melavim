<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── CONSTANTS ────────────────────────────────────────────────
const MONTHS_HE = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const fmt = n => Number(n||0).toLocaleString("he-IL",{minimumFractionDigits:0,maximumFractionDigits:0});
const now = new Date();
const mkMonthKey = (y,m) => `${y}-${String(m+1).padStart(2,'0')}`;
const mkMonthLabel = (y,m) => `${MONTHS_HE[m]} ${y}`;
const labelFromKey = k => { const [y,m]=k.split("-").map(Number); return mkMonthLabel(y,m-1); };
const fmtDateTime = ts => new Date(ts).toLocaleString("he-IL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
const nowLocalInput = () => {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
};
const fmtDateShort = ts => new Date(ts).toLocaleDateString("he-IL",{day:"2-digit",month:"2-digit"});
const toIntlPhone = p => {
  let d = (p||"").replace(/\D/g,"");
  if(d.startsWith("0")) d = "972"+d.slice(1);
  return d;
};
const waLink = (phone,text) => `https://wa.me/${toIntlPhone(phone)}?text=${encodeURIComponent(text)}`;

// ── FIREBASE HELPERS ─────────────────────────────────────────
function fbSet(path,val){ db.ref(path).set(val); }
function fbListen(path,cb){
  const ref=db.ref(path);
  ref.on("value",snap=>cb(snap.val()));
  return ()=>ref.off("value");
}

// ── MAIN APP ─────────────────────────────────────────────────
function App(){
  const [ready,setReady]   = useState(false);
  const [tab,setTab]       = useState("shmulik");
  const [syncing,setSyncing] = useState(false);
  const [shmulik,setShmulik] = useState({});
  const [engel,setEngel]     = useState({});
  const [phones,setPhones]   = useState({});

  useEffect(()=>{
    let loaded={sh:false,en:false,ph:false};
    const check=()=>{ if(loaded.sh&&loaded.en&&loaded.ph) setReady(true); };
    const u1=fbListen("melavim/shmulik/months",v=>{ setShmulik(v||{}); loaded.sh=true; check(); });
    const u2=fbListen("melavim/engel",          v=>{ setEngel(v||{});   loaded.en=true; check(); });
    const u3=fbListen("melavim/phones",         v=>{ setPhones(v||{}); loaded.ph=true; check(); });
    return ()=>{u1();u2();u3();};
  },[]);

  const sync = fn => { setSyncing(true); fn(); setTimeout(()=>setSyncing(false),900); };
  const setPhone = (key,val) => fbSet(`melavim/phones/${key}`, val);

  const selKey   = mkMonthKey(now.getFullYear(),now.getMonth());
  const selLabel = mkMonthLabel(now.getFullYear(),now.getMonth());

  const tabS = t => ({padding:"9px 14px",borderRadius:8,border:tab===t?"2px solid #1e3a5f":"2px solid #e2e8f0",background:tab===t?"#1e3a5f":"#f8fafc",cursor:"pointer",fontWeight:600,fontSize:13,color:tab===t?"#fff":"#64748b"});

  if(!ready) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16,color:"#475569"}}>
      <div style={{fontSize:32,fontWeight:800,color:"#1e3a5f"}}>מלווים</div>
      <div style={{fontSize:14,opacity:.7}}>מתחבר לענן...</div>
      <div style={{width:40,height:40,border:"4px solid #e2e8f0",borderTop:"4px solid #2563eb",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      <header style={{background:"#fff",boxShadow:"0 2px 8px rgba(0,0,0,0.08)",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:520,margin:"0 auto",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:"#1e3a5f"}}>מלווים</div>
            <div style={{fontSize:10,color:"#94a3b8",display:"flex",alignItems:"center",gap:4}}>
              מעקב תשלומים
              <span style={{width:6,height:6,borderRadius:"50%",background:syncing?"#f59e0b":"#22c55e",display:"inline-block"}}/>
              <span>{syncing?"שומר...":"מסונכרן ☁️"}</span>
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setTab("shmulik")} style={tabS("shmulik")}>👤 שמוליק</button>
            <button onClick={()=>setTab("engel")}   style={tabS("engel")}>👥 אנגל</button>
          </div>
        </div>
      </header>

      <main style={{maxWidth:520,margin:"0 auto",padding:"12px 14px"}}>
        {tab==="shmulik" && <ShmulikTab data={shmulik} selKey={selKey} selLabel={selLabel} sync={sync} phone={phones.shmulik} setPhone={v=>setPhone("shmulik",v)}/>}
        {tab==="engel"   && <EngelTab   data={engel}   selKey={selKey} selLabel={selLabel} sync={sync} phone={phones.engel} setPhone={v=>setPhone("engel",v)}/>}
      </main>
    </div>
  );
}

// ── SHMULIK TAB ────────────────────────────────────────────────
const SHMULIK_TYPES = {morning:{icon:"🌅",label:"בוקר"}, afternoon:{icon:"🌞",label:"צהריים"}};

function ShmulikTab({ data, selKey, selLabel, sync, phone, setPhone }){
  const cur   = data[selKey] || {};
  const log   = cur.log || [];
  const clicks= cur.log ? cur.log.length : (cur.clicks||0);
  const total = clicks*20;
  const paymentsObj = cur.payments || {};
  const totalPaid = Object.values(paymentsObj).reduce((s,p)=>s+(p.amount||0),0);
  const remaining = total - totalPaid;

  const [chargeTime,setChargeTime] = useState(nowLocalInput());
  const [chargeType,setChargeType] = useState(new Date().getHours()<12?"morning":"afternoon");
  const [phoneInput,setPhoneInput] = useState(phone||"");
  useEffect(()=>{ setPhoneInput(phone||""); },[phone]);

  const addCharge = () => {
    const d = chargeTime ? new Date(chargeTime) : new Date();
    const ts = d.getTime();
    const targetKey = mkMonthKey(d.getFullYear(),d.getMonth());
    const tcur = data[targetKey] || {};
    const tlog = (tcur.log||[]).concat([{ts,type:chargeType}]).sort((a,b)=>a.ts-b.ts);
    sync(()=>fbSet(`melavim/shmulik/months/${targetKey}`, {...tcur, log:tlog, clicks:tlog.length}));
    setChargeTime(nowLocalInput());
  };
  const sendSummary = () => {
    const lastSentTs = cur.lastSentTs||0;
    const newEntries = log.filter(l=>l.ts>lastSentTs).sort((a,b)=>a.ts-b.ts);
    const newSum = newEntries.length*20;
    const prevAmount = Math.max(0, total-newSum);
    const lines = newEntries.map(l=>{
      const t = SHMULIK_TYPES[l.type];
      return `${fmtDateShort(l.ts)} - ${t?`${t.icon} ${t.label}`:"ליווי"} - 20 ₪`;
    });
    let body = lines.length ? lines.join("\n") : "(אין ליוויים חדשים מהשליחה הקודמת)";
    body += `\n\nנוכחי: ${newEntries.length} ליוויים × 20 ₪ = ${fmt(newSum)} ₪`;
    if(prevAmount>0) body += `\nקודם (לא שולם): ${fmt(prevAmount)} ₪`;
    const text = `שלום שמוליק! 👋\nסיכום ${selLabel}:\n\n${body}\n\n💰 סה״כ: ${fmt(total)} ₪ 🙏`;
    window.open(waLink(phoneInput,text),"_blank");
    sync(()=>fbSet(`melavim/shmulik/months/${selKey}/lastSentTs`, Date.now()));
  };
  const undoClick = () => {
    if(!log.length) return;
    const newLog = log.slice(0,-1);
    sync(()=>fbSet(`melavim/shmulik/months/${selKey}`, {...cur, log:newLog, clicks:newLog.length}));
  };
  const removeEntry = (i) => {
    const newLog = log.filter((_,idx)=>idx!==i);
    sync(()=>fbSet(`melavim/shmulik/months/${selKey}`, {...cur, log:newLog, clicks:newLog.length}));
  };

  const months = Object.keys(data).filter(k=>k!==selKey).sort().reverse();
  const countFor = k => { const m=data[k]; return m?.log?m.log.length:(m?.clicks||0); };
  const paidFor  = k => { const p=data[k]?.payments||{}; return Object.values(p).reduce((s,x)=>s+(x.amount||0),0); };

  return (
    <div style={col}>
      <div style={bigCard}>
        <div style={{fontSize:13,opacity:.75,marginBottom:4}}>{selLabel} — יתרה לגבייה</div>
        <div style={{fontSize:42,fontWeight:800}}>{fmt(Math.max(0,remaining))} ₪</div>
        <div style={{fontSize:12,opacity:.7,marginTop:4}}>חויב: {fmt(total)} ₪ &nbsp;|&nbsp; שולם: {fmt(totalPaid)} ₪</div>
      </div>

      <div style={{display:"flex",gap:8}}>
        <button style={typeBtn(chargeType==="morning")} onClick={()=>setChargeType("morning")}>🌅 בוקר</button>
        <button style={typeBtn(chargeType==="afternoon")} onClick={()=>setChargeType("afternoon")}>🌞 צהריים</button>
      </div>
      <div style={{display:"flex",gap:8}}>
        <input style={{...iinp,flex:1}} type="datetime-local" value={chargeTime} onChange={e=>setChargeTime(e.target.value)} />
        <button style={{...bigBtn,flex:"0 0 auto"}} onClick={addCharge}>➕ 20 ₪</button>
      </div>
      <div style={{fontSize:11,color:"#94a3b8"}}>אפשר לשנות את התאריך כדי לרשום חיוב קודם — הוא יתווסף לחודש המתאים</div>
      <button style={{...smallBtn,opacity:clicks>0?1:0.5}} disabled={!clicks} onClick={undoClick}>↩ בטל חיוב אחרון</button>

      {log.length>0 && (
        <div style={card}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>📋 חיובים — {selLabel}</div>
          <div style={{maxHeight:160,overflowY:"auto"}}>
            {log.slice().reverse().map((l,i)=>{
              const idx=log.length-1-i;
              return (
                <div key={idx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,color:"#64748b",padding:"4px 0",borderBottom:"1px solid #f1f5f9"}}>
                  <span>{fmtDateTime(l.ts)}{l.type?` · ${SHMULIK_TYPES[l.type].icon} ${SHMULIK_TYPES[l.type].label}`:""}</span>
                  <span style={{display:"flex",alignItems:"center",gap:6}}>
                    <span>20 ₪</span>
                    <button style={delBtn} onClick={()=>removeEntry(idx)}>✕</button>
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <ShmulikPaymentsSection data={data} selKey={selKey} selLabel={selLabel} sync={sync} />

      <div style={card}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>📲 שליחת סיכום לשמוליק</div>
        <input style={{...iinp,width:"100%",marginBottom:8}} type="tel" placeholder="מספר טלפון (לדוגמה 0501234567)" value={phoneInput} onChange={e=>{setPhoneInput(e.target.value); setPhone(e.target.value);}} />
        <button style={{...bigBtn,width:"100%",background:"#25D366",opacity:log.length?1:0.5}} disabled={!log.length} onClick={sendSummary}>📤 שלח סיכום בוואטסאפ</button>
      </div>

      <div style={card}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📂 סיכום חודשים קודמים</div>
        {months.length===0
          ? <div style={empty}>אין עדיין נתונים מחודשים קודמים</div>
          : <table style={tbl}>
              <thead><tr><th style={th}>חודש</th><th style={th}>חיובים</th><th style={th}>סה״כ</th><th style={th}>שולם</th><th style={th}>יתרה</th></tr></thead>
              <tbody>
                {months.map(k=>{
                  const c=countFor(k);
                  const t=c*20;
                  const pd=paidFor(k);
                  const rem=t-pd;
                  return (
                    <tr key={k} style={{borderBottom:"1px solid #f1f5f9"}}>
                      <td style={td}>{labelFromKey(k)}</td>
                      <td style={td}>{c}</td>
                      <td style={{...td,fontWeight:700}}>{fmt(t)} ₪</td>
                      <td style={{...td,color:"#16a34a"}}>{fmt(pd)} ₪</td>
                      <td style={{...td,fontWeight:700,color:rem>0?"#dc2626":"#16a34a"}}>{fmt(rem)} ₪</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
        }
      </div>
    </div>
  );
}

// ── SHMULIK PAYMENTS SECTION ──────────────────────────────────
function ShmulikPaymentsSection({ data, selKey, selLabel, sync }){
  const cur = data[selKey] || {};
  const paymentsObj = cur.payments || {};
  const payList = Object.values(paymentsObj).sort((a,b)=>a.ts-b.ts);

  const [addAmt, setAddAmt]   = useState("");
  const [addTime, setAddTime] = useState(nowLocalInput());
  const [editKey, setEditKey] = useState(null);
  const [editAmt, setEditAmt] = useState("");

  const addPayment = () => {
    const v = Number(addAmt);
    if(!v || v<=0) return;
    const ts = addTime ? new Date(addTime).getTime() : Date.now();
    const key = String(ts);
    sync(()=>fbSet(`melavim/shmulik/months/${selKey}/payments/${key}`, {ts, amount:v}));
    setAddAmt("");
    setAddTime(nowLocalInput());
  };

  const deletePayment = key => {
    sync(()=>fbSet(`melavim/shmulik/months/${selKey}/payments/${key}`, null));
  };

  const saveEdit = () => {
    const v = Number(editAmt);
    if(v>0){
      sync(()=>fbSet(`melavim/shmulik/months/${selKey}/payments/${editKey}`, {ts:Number(editKey), amount:v}));
    }
    setEditKey(null);
  };

  return (
    <div style={{...card,borderRight:"4px solid #22c55e"}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>💰 תשלומים שהתקבלו — {selLabel}</div>
      <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
        <input style={{...iinp,flex:"1 1 80px",minWidth:80}} type="number" placeholder="סכום שהתקבל" value={addAmt} onChange={e=>setAddAmt(e.target.value)} />
        <input style={{...iinp,flex:"2 1 130px",minWidth:130}} type="datetime-local" value={addTime} onChange={e=>setAddTime(e.target.value)} />
        <button style={{...bigBtn,padding:"8px 14px",fontSize:13,flex:"0 0 auto"}} onClick={addPayment}>➕ הוסף</button>
      </div>
      {payList.length>0 ? (
        <div style={{maxHeight:160,overflowY:"auto"}}>
          {[...payList].reverse().map(p=>{
            const key = String(p.ts);
            return (
              <div key={key} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:"1px solid #f1f5f9",fontSize:12}}>
                <span style={{color:"#64748b",flex:1}}>{fmtDateTime(p.ts)}</span>
                {editKey===key ? (
                  <>
                    <input style={{...iinp,width:80,fontSize:12,padding:"2px 4px"}} type="number" value={editAmt} onChange={e=>setEditAmt(e.target.value)} autoFocus />
                    <button style={{...smallBtn,padding:"2px 8px",fontSize:11}} onClick={saveEdit}>✔</button>
                    <button style={{...smallBtn,padding:"2px 8px",fontSize:11}} onClick={()=>setEditKey(null)}>✕</button>
                  </>
                ) : (
                  <>
                    <span style={{fontWeight:700,color:"#16a34a"}}>{fmt(p.amount)} ₪</span>
                    <button style={{...smallBtn,padding:"2px 7px",fontSize:11}} onClick={()=>{setEditKey(key);setEditAmt(String(p.amount));}}>✏️</button>
                    <button style={delBtn} onClick={()=>deletePayment(key)}>✕</button>
                  </>
                )}
              </div>
            );
          })}
        </div>
      ) : (
        <div style={empty}>אין תשלומים שהוזנו עדיין</div>
      )}
    </div>
  );
}

// ── ENGEL TAB ──────────────────────────────────────────────────
function PersonCard({ title, color, amount, person, data, selKey, sync }){
  const d = data[person] || {balance:0, log:[]};
  const balance = d.balance||0;
  const log = d.log||[];
  const [chargeTime,setChargeTime]=useState(nowLocalInput());
  const [showCal,setShowCal]=useState(false);

  const addCharge = () => {
    const dt = chargeTime ? new Date(chargeTime) : new Date();
    const ts = dt.getTime();
    const newLog = [...log,{ts,amount}].sort((a,b)=>a.ts-b.ts);
    sync(()=>fbSet(`melavim/engel/${person}`, {balance:balance+amount, log:newLog}));
    setChargeTime(nowLocalInput());
  };
  const undoClick = () => {
    if(!log.length) return;
    const last=log[log.length-1];
    const newLog=log.slice(0,-1);
    sync(()=>fbSet(`melavim/engel/${person}`, {balance:Math.max(0,balance-last.amount), log:newLog}));
  };
  const removeEntry = (i) => {
    const entry=log[i];
    const newLog=log.filter((_,idx)=>idx!==i);
    sync(()=>fbSet(`melavim/engel/${person}`, {balance:Math.max(0,balance-entry.amount), log:newLog}));
  };

  return (
    <div style={{...card,borderRight:`4px solid ${color}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontWeight:700,fontSize:15}}>{title}</span>
        <span style={{fontSize:20,fontWeight:800,color}}>{fmt(balance)} ₪</span>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:4}}>
        <input style={{...iinp,flex:1}} type="datetime-local" value={chargeTime} onChange={e=>setChargeTime(e.target.value)} />
        <button style={{...bigBtn,background:color}} onClick={addCharge}>➕ {amount} ₪</button>
        <button style={{...smallBtn,opacity:log.length?1:0.5}} disabled={!log.length} onClick={undoClick}>↩ בטל</button>
      </div>
      <div style={{fontSize:11,color:"#94a3b8",marginBottom:8}}>אפשר לשנות את התאריך כדי לרשום חיוב קודם — הוא יתווסף לסכום הכולל</div>

      <button style={{...smallBtn,width:"100%",marginBottom:8}} onClick={()=>setShowCal(s=>!s)}>{showCal?"📅 הסתר לוח חודש":"📅 לוח חודש — סימון ימים"}</button>
      {showCal && <MonthCalendar log={log} balance={balance} person={person} amount={amount} color={color} selKey={selKey} sync={sync} />}

      {log.length>0 && (
        <div style={{marginTop:10,maxHeight:120,overflowY:"auto",fontSize:11,color:"#64748b"}}>
          {log.slice().reverse().map((l,i)=>{
            const idx=log.length-1-i;
            return (
              <div key={idx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"2px 0",borderBottom:"1px solid #f1f5f9"}}>
                <span>{fmtDateTime(l.ts)}</span>
                <span style={{display:"flex",alignItems:"center",gap:6}}>
                  <span>+{fmt(l.amount)} ₪</span>
                  <button style={delBtn} onClick={()=>removeEntry(idx)}>✕</button>
                </span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── ENGEL PAYMENTS SECTION ────────────────────────────────────
function EngelPaymentsSection({ data, sync }){
  const shalom = data.shalom || {balance:0};
  const zamba  = data.zamba  || {balance:0};
  const paymentsObj = data.payments || {};
  const payList = Object.values(paymentsObj).sort((a,b)=>a.ts-b.ts);
  const combined = (shalom.balance||0)+(zamba.balance||0);

  const [addAmt, setAddAmt]   = useState("");
  const [addTime, setAddTime] = useState(nowLocalInput());
  const [editKey, setEditKey] = useState(null);
  const [editAmt, setEditAmt] = useState("");

  const distribute = (amount) => {
    const sh = shalom.balance||0;
    const za = zamba.balance||0;
    const fromSh = Math.min(amount, sh);
    const fromZa = Math.min(amount-fromSh, za);
    return { newShalom: sh-fromSh, newZamba: za-fromZa };
  };

  const addPayment = () => {
    const v = Number(addAmt);
    if(!v||v<=0) return;
    const ts = addTime ? new Date(addTime).getTime() : Date.now();
    const key = String(ts);
    const { newShalom, newZamba } = distribute(v);
    sync(()=>{
      fbSet(`melavim/engel/payments/${key}`, {ts, amount:v});
      fbSet(`melavim/engel/shalom/balance`, newShalom);
      fbSet(`melavim/engel/zamba/balance`,  newZamba);
    });
    setAddAmt("");
    setAddTime(nowLocalInput());
  };

  const deletePayment = (key, amount) => {
    sync(()=>{
      fbSet(`melavim/engel/payments/${key}`, null);
      fbSet(`melavim/engel/shalom/balance`, (shalom.balance||0)+amount);
    });
  };

  const saveEdit = (originalAmount) => {
    const newAmt = Number(editAmt);
    if(newAmt<=0){ setEditKey(null); return; }
    const diff = newAmt - originalAmount;
    let newShalom = shalom.balance||0;
    let newZamba  = zamba.balance||0;
    if(diff>0){
      const fromSh = Math.min(diff, newShalom);
      const fromZa = Math.min(diff-fromSh, newZamba);
      newShalom -= fromSh; newZamba -= fromZa;
    } else if(diff<0){
      newShalom += Math.abs(diff);
    }
    sync(()=>{
      fbSet(`melavim/engel/payments/${editKey}`, {ts:Number(editKey), amount:newAmt});
      fbSet(`melavim/engel/shalom/balance`, Math.max(0,newShalom));
      fbSet(`melavim/engel/zamba/balance`,  Math.max(0,newZamba));
    });
    setEditKey(null);
  };

  return (
    <div style={{...card,borderRight:"4px solid #22c55e"}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>💰 תשלומים שהתקבלו מאנגל</div>
      <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>
        יתרה לגבייה:&nbsp;
        <strong style={{color:combined>0?"#dc2626":"#16a34a"}}>{fmt(combined)} ₪</strong>
        <span style={{fontSize:11,color:"#94a3b8",marginRight:6}}>(שלום: {fmt(shalom.balance||0)} + זמבא: {fmt(zamba.balance||0)})</span>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
        <input style={{...iinp,flex:"1 1 80px",minWidth:80}} type="number" placeholder="סכום שהתקבל" value={addAmt} onChange={e=>setAddAmt(e.target.value)} />
        <input style={{...iinp,flex:"2 1 130px",minWidth:130}} type="datetime-local" value={addTime} onChange={e=>setAddTime(e.target.value)} />
        <button style={{...bigBtn,padding:"8px 14px",fontSize:13,flex:"0 0 auto"}} onClick={addPayment}>➕ הוסף</button>
      </div>
      {payList.length>0 ? (
        <div style={{maxHeight:160,overflowY:"auto"}}>
          {[...payList].reverse().map(p=>{
            const key = String(p.ts);
            return (
              <div key={key} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:"1px solid #f1f5f9",fontSize:12}}>
                <span style={{color:"#64748b",flex:1}}>{fmtDateTime(p.ts)}</span>
                {editKey===key ? (
                  <>
                    <input style={{...iinp,width:80,fontSize:12,padding:"2px 4px"}} type="number" value={editAmt} onChange={e=>setEditAmt(e.target.value)} autoFocus />
                    <button style={{...smallBtn,padding:"2px 8px",fontSize:11}} onClick={()=>saveEdit(p.amount)}>✔</button>
                    <button style={{...smallBtn,padding:"2px 8px",fontSize:11}} onClick={()=>setEditKey(null)}>✕</button>
                  </>
                ) : (
                  <>
                    <span style={{fontWeight:700,color:"#16a34a"}}>{fmt(p.amount)} ₪</span>
                    <button style={{...smallBtn,padding:"2px 7px",fontSize:11}} onClick={()=>{setEditKey(key);setEditAmt(String(p.amount));}}>✏️</button>
                    <button style={delBtn} onClick={()=>deletePayment(key,p.amount)}>✕</button>
                  </>
                )}
              </div>
            );
          })}
        </div>
      ) : (
        <div style={empty}>אין תשלומים שהוזנו עדיין</div>
      )}
    </div>
  );
}

const WEEKDAYS_HE = ["א","ב","ג","ד","ה","ו","ש"];

function MonthCalendar({ log, balance, person, amount, color, selKey, sync }){
  const [viewKey,setViewKey] = useState(selKey);
  const [vy,vm] = viewKey.split("-").map(Number);
  const daysInMonth = new Date(vy,vm,0).getDate();
  const firstDow = new Date(vy,vm-1,1).getDay();
  const today = new Date();
  const isCurMonth = today.getFullYear()===vy && (today.getMonth()+1)===vm;
  const markedDays = new Set(
    log.filter(l=>{ const d=new Date(l.ts); return d.getFullYear()===vy && (d.getMonth()+1)===vm; })
       .map(l=>new Date(l.ts).getDate())
  );

  const shiftMonth = (delta) => {
    let y=vy, m=(vm-1)+delta;
    if(m<0){ y--; m+=12; }
    if(m>11){ y++; m-=12; }
    setViewKey(mkMonthKey(y,m));
  };

  const toggleDay = (day) => {
    const sameDay = log.filter(l=>{
      const d=new Date(l.ts);
      return d.getFullYear()===vy && (d.getMonth()+1)===vm && d.getDate()===day;
    });
    if(sameDay.length>0){
      const removeAmount = sameDay.reduce((s,e)=>s+e.amount,0);
      const newLog = log.filter(l=>!sameDay.includes(l));
      sync(()=>fbSet(`melavim/engel/${person}`, {balance:Math.max(0,balance-removeAmount), log:newLog}));
    } else {
      const ts = new Date(vy,vm-1,day,12,0).getTime();
      const newLog = [...log,{ts,amount}].sort((a,b)=>a.ts-b.ts);
      sync(()=>fbSet(`melavim/engel/${person}`, {balance:balance+amount, log:newLog}));
    }
  };

  return (
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <button style={smallBtn} onClick={()=>shiftMonth(-1)}>◀</button>
        <span style={{fontWeight:700,fontSize:13}}>{labelFromKey(viewKey)}</span>
        <button style={smallBtn} onClick={()=>shiftMonth(1)}>▶</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
        {WEEKDAYS_HE.map(w=>(
          <div key={w} style={{textAlign:"center",fontSize:11,color:"#94a3b8",fontWeight:700}}>{w}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {Array.from({length:firstDow}).map((_,i)=><div key={"e"+i}/>)}
        {Array.from({length:daysInMonth},(_,i)=>i+1).map(day=>{
          const on = markedDays.has(day);
          const isToday = isCurMonth && today.getDate()===day;
          return (
            <button key={day}
              style={{padding:"8px 0",borderRadius:6,
                border:isToday?"2px solid #f59e0b":(on?`2px solid ${color}`:"1px solid #e2e8f0"),
                background:on?color:"#f8fafc",
                color:on?"#fff":"#64748b",
                fontSize:12,fontWeight:600,cursor:"pointer"}}
              onClick={()=>toggleDay(day)}>
              {day}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function EngelTab({ data, selKey, selLabel, sync, phone, setPhone }){
  const shalom = data.shalom || {balance:0,log:[]};
  const zamba  = data.zamba  || {balance:0,log:[]};
  const combined = (shalom.balance||0)+(zamba.balance||0);
  const [phoneInput,setPhoneInput] = useState(phone||"");
  useEffect(()=>{ setPhoneInput(phone||""); },[phone]);

  const sendSummary = () => {
    const shalomLastSent = shalom.lastSentTs||0;
    const zambaLastSent  = zamba.lastSentTs||0;
    const shalomNew = (shalom.log||[]).filter(l=>l.ts>shalomLastSent);
    const zambaNew  = (zamba.log||[]).filter(l=>l.ts>zambaLastSent);
    const shalomNewSum = shalomNew.reduce((s,e)=>s+e.amount,0);
    const zambaNewSum  = zambaNew.reduce((s,e)=>s+e.amount,0);
    const newSum  = shalomNewSum+zambaNewSum;
    const prevAmount = Math.max(0,(shalom.balance||0)-shalomNewSum) + Math.max(0,(zamba.balance||0)-zambaNewSum);

    const entries = [
      ...shalomNew.map(l=>({...l,who:"שלום"})),
      ...zambaNew.map(l=>({...l,who:"זמבא"})),
    ].sort((a,b)=>a.ts-b.ts);
    let body = entries.length
      ? entries.map(l=>`${fmtDateShort(l.ts)} - ${l.who} - ${fmt(l.amount)} ₪`).join("\n")
      : "(אין נסיעות חדשות מהשליחה הקודמת)";
    body += `\n\nנוכחי: ${fmt(newSum)} ₪`;
    if(prevAmount>0) body += `\nקודם (לא שולם): ${fmt(prevAmount)} ₪`;

    const text = `שלום אנגל! 👋\nסיכום נסיעות:\n\n${body}\n\nשלום: ${fmt(shalom.balance||0)} ₪\nזמבא: ${fmt(zamba.balance||0)} ₪\n\n💰 סה״כ לתשלום (שלום+זמבא): ${fmt(combined)} ₪ 🙏`;
    window.open(waLink(phoneInput,text),"_blank");
    const sentNow = Date.now();
    sync(()=>{ fbSet(`melavim/engel/shalom/lastSentTs`, sentNow); fbSet(`melavim/engel/zamba/lastSentTs`, sentNow); });
  };

  return (
    <div style={col}>
      <div style={bigCard}>
        <div style={{fontSize:13,opacity:.75,marginBottom:4}}>סה״כ לגבות מאנגל</div>
        <div style={{fontSize:42,fontWeight:800}}>{fmt(combined)} ₪</div>
        <div style={{display:"flex",gap:7,marginTop:10,flexWrap:"wrap"}}>
          <Chip label="שלום" val={fmt(shalom.balance||0)+" ₪"} />
          <Chip label="זמבא" val={fmt(zamba.balance||0)+" ₪"} />
        </div>
      </div>

      <PersonCard title="שלום" color="#2563eb" amount={100} person="shalom" data={data} selKey={selKey} sync={sync} />
      <PersonCard title="זמבא" color="#7c3aed" amount={80}  person="zamba"  data={data} selKey={selKey} sync={sync} />

      <EngelPaymentsSection data={data} sync={sync} />

      <div style={card}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>📲 שליחת סיכום לאנגל</div>
        <input style={{...iinp,width:"100%",marginBottom:8}} type="tel" placeholder="מספר טלפון (לדוגמה 0501234567)" value={phoneInput} onChange={e=>{setPhoneInput(e.target.value); setPhone(e.target.value);}} />
        <button style={{...bigBtn,width:"100%",background:"#25D366",opacity:combined?1:0.5}} disabled={!combined} onClick={sendSummary}>📤 שלח סיכום בוואטסאפ</button>
      </div>
    </div>
  );
}

  return <div style={{background:"rgba(255,255,255,0.14)",borderRadius:8,padding:"4px 10px",fontSize:12,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
    <span style={{opacity:.7,fontSize:10}}>{label}</span><span style={{fontWeight:700}}>{val}</span>
  </div>;
}
